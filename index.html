<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a0a08">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- Prevent any caching so every scan fetches a fresh token -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥁</text></svg>">
  <title>Medhini Parai Kuzhu – Attendance</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    :root {
      --orange: #e67e22;
      --muted:  #a07050;
      --faint:  #604030;
      --bg:     #160806;
      --text:   #f5e6d3;
      --red:    #c0392b;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 0;
      -webkit-font-smoothing: antialiased;
    }
    .drum    { font-size: 3rem; line-height: 1; margin-bottom: 0.5rem; }
    .title   { font-size: 1.6rem; font-weight: 800; color: var(--orange); margin: 0 0 0.2rem; }
    .sub     { font-size: 0.85rem; color: var(--muted); margin: 0 0 2rem; }

    .spinner {
      width: 42px; height: 42px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-text { font-size: 0.9rem; color: var(--muted); }

    /* Error / session-closed states */
    .state         { display: none; flex-direction: column; align-items: center; padding: 0 1.5rem; max-width: 360px; }
    .state.active  { display: flex; }
    .big-icon      { font-size: 3.5rem; line-height: 1; margin-bottom: 0.75rem; }
    .msg-head      { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .msg-sub       { font-size: 0.87rem; color: var(--muted); line-height: 1.5; }

    .retry-btn {
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="drum">🥁</div>
  <h1 class="title">Medhini Parai Kuzhu</h1>
  <p class="sub">Group Attendance</p>

  <!-- Loading -->
  <div class="state active" id="state-loading">
    <div class="spinner"></div>
    <p class="status-text">Checking in…</p>
  </div>

  <!-- Session gate closed (only shown when REQUIRE_OPEN_SESSION = true) -->
  <div class="state" id="state-closed">
    <div class="big-icon">🥁</div>
    <div class="msg-head" style="color:var(--orange);">No Active Session</div>
    <p class="msg-sub">Check-in is not open right now. Your admin will open it before the next rehearsal — come back and scan then.</p>
  </div>

  <!-- Network error -->
  <div class="state" id="state-error">
    <div class="big-icon">⚠️</div>
    <div class="msg-head" style="color:#e74c3c;">Connection Problem</div>
    <p class="msg-sub">Could not reach the server. Check your connection and try again.</p>
    <button class="retry-btn" onclick="boot()">
      <i class="bi bi-arrow-clockwise"></i> Retry
    </button>
  </div>

<script>
/* ════════════════════════════════════════════════════════════
   Config — must match auth.js
   ════════════════════════════════════════════════════════════ */
const WORKER_URL   = 'https://medhinikuzhu.utopia4163.workers.dev/';
const AUTH_API_KEY = 'm61i(fi2wu2p965^6vlv!%#lnf6d)tj+^8g5wd7k8p6ombe*$4';

/* ════════════════════════════════════════════════════════════
   State helpers
   ════════════════════════════════════════════════════════════ */
function showState(name) {
  document.querySelectorAll('.state').forEach(el => el.classList.remove('active'));
  document.getElementById('state-' + name).classList.add('active');
}

/* ════════════════════════════════════════════════════════════
   Boot — called on every scan of the printed QR code
   ════════════════════════════════════════════════════════════ */
async function boot() {
  showState('loading');

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 10000);

  try {
    const res = await fetch(WORKER_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': AUTH_API_KEY },
      body:    JSON.stringify({ action: 'getCheckinToken' }),
      signal:  controller.signal,
    }).then(r => r.json());

    clearTimeout(timer);

    if (!res.active) {
      // Session gate is enabled and no session is open today
      showState('closed');
      return;
    }

    // Store the one-time token in sessionStorage so it flows to checkin.html
    // without ever appearing in a URL — sessionStorage is tab-scoped and dies
    // when the tab is closed, so bookmarks cannot carry it.
    sessionStorage.setItem('ck_token', res.token);

    // Replace this page in history so Back doesn't re-trigger a second token
    window.location.replace('checkin.html');

  } catch (e) {
    clearTimeout(timer);
    showState('error');
  }
}

document.addEventListener('DOMContentLoaded', boot);
</script>
</body>
</html>
